<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bigint 漢数字変換</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --text: #202124;
      --muted: #657077;
      --line: #d9ded8;
      --accent: #0d6f6e;
      --accent-strong: #084f4e;
      --error: #b42318;
      --shadow: 0 18px 42px rgb(38 50 56 / 12%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgb(13 111 110 / 10%), transparent 36%),
        linear-gradient(315deg, rgb(222 93 64 / 10%), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
    }

    .source-link {
      display: block;
      width: fit-content;
      margin: 24px 0 0 auto;
      color: var(--muted);
      font-size: .82rem;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .source-link:hover {
      color: var(--accent-strong);
    }

    .tool {
      display: grid;
      gap: 18px;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }

    textarea,
    output {
      width: 100%;
      min-height: 138px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      color: var(--text);
      font: 1.05rem/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
      resize: vertical;
    }

    textarea:focus {
      outline: 3px solid rgb(13 111 110 / 18%);
      border-color: var(--accent);
    }

    output {
      display: block;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary {
      background: #e9efee;
      color: var(--accent-strong);
    }

    .status {
      min-height: 1.5em;
      color: var(--muted);
      font-size: .95rem;
    }

    .status a {
      color: var(--accent-strong);
      overflow-wrap: anywhere;
    }

    .status.error {
      color: var(--error);
      font-weight: 700;
    }

    .examples {
      margin-top: 20px;
      color: var(--muted);
      font-size: .95rem;
    }

    #maxInfo {
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 960px);
        padding: 28px 0;
      }

      .tool {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>bigint 漢数字変換</h1>
    <p class="lead">任意精度整数やSI記号付き数値を、組み込み数詞データで漢数字へ変換します。</p>

    <section class="tool" aria-label="漢数字変換">
      <label>
        bigint
        <textarea id="input" inputmode="numeric" spellcheck="false">2</textarea>
      </label>

      <div class="actions">
        <button id="convert" type="button">変換</button>
        <button id="square" class="secondary" type="button">自乗</button>
        <button id="sqrt" class="secondary" type="button">平方根</button>
        <button id="times10" class="secondary" type="button">10倍</button>
        <button id="divide10" class="secondary" type="button">1/10</button>
        <button id="max" class="secondary" type="button">最大値</button>
        <button id="clear" class="secondary" type="button">クリア</button>
        <button id="copy" class="secondary" type="button">コピー</button>
      </div>

      <label>
        漢数字
        <output id="output" for="input"></output>
      </label>

      <div id="status" class="status" role="status"></div>
    </section>

    <p id="maxInfo" class="examples"></p>
    <p class="examples">例: 0 / 10,000 / 2M / 3.2R / 1G234M567k890 / 123,456,789,012,345,678,901,234,567,890</p>
    <a class="source-link" href="https://github.com/code4fukui/dentaku">src on GitHub</a>
  </main>

  <script type="module">
    import {
      NUMERAL_SYSTEM,
      SI_SYMBOL_SYSTEM,
      bigintToKanji,
      getMaxPower,
      getMaxValue,
      parseSiInputBigInt,
      parseSingleSiInput,
      scaleDecimalBy10,
    } from "./numconverter.js";

    const input = document.querySelector("#input");
    const output = document.querySelector("#output");
    const status = document.querySelector("#status");
    const maxInfo = document.querySelector("#maxInfo");
    const convertButton = document.querySelector("#convert");
    const squareButton = document.querySelector("#square");
    const sqrtButton = document.querySelector("#sqrt");
    const times10Button = document.querySelector("#times10");
    const divide10Button = document.querySelector("#divide10");
    const maxButton = document.querySelector("#max");
    const clearButton = document.querySelector("#clear");
    const copyButton = document.querySelector("#copy");

    const updateMaxInfo = () => {
      const maxPower = getMaxPower(NUMERAL_SYSTEM);
      const symbols = [...SI_SYMBOL_SYSTEM.entries()]
        .sort((a, b) => a[1] - b[1])
        .map(([symbol, power]) => `${symbol}=10^${power}`)
        .join(" / ");
      maxInfo.textContent = `表現できる最大値: 10^${maxPower + 4} - 1（最大単位: ${NUMERAL_SYSTEM.get(maxPower)}）\n使えるSI単位系: ${symbols}`;
    };

    const scaleInputBy10 = (exponent) => {
      const siInput = parseSingleSiInput(input.value, SI_SYMBOL_SYSTEM);
      if (siInput) {
        input.value = `${siInput.sign}${scaleDecimalBy10(siInput.number, exponent)}${siInput.symbol}`;
        convert();
        return;
      }

      const value = getInputBigInt();
      setInputBigInt(exponent > 0 ? value * 10n : value / 10n);
    };

    const getInputBigInt = () => {
      return parseSiInputBigInt(input.value, SI_SYMBOL_SYSTEM);
    };

    const setInputBigInt = (value) => {
      input.value = value.toString();
      convert();
    };

    const integerSqrt = (value) => {
      if (value < 0n) {
        throw new Error("負の数の平方根は計算できません。");
      }
      if (value < 2n) return value;

      let small = 1n;
      let large = value;
      while (small <= large) {
        const middle = (small + large) / 2n;
        const square = middle * middle;
        if (square === value) return middle;
        if (square < value) {
          small = middle + 1n;
        } else {
          large = middle - 1n;
        }
      }
      return large;
    };

    const convert = () => {
      try {
        output.value = bigintToKanji(parseSiInputBigInt(input.value, SI_SYMBOL_SYSTEM), NUMERAL_SYSTEM);
        status.classList.remove("error");
      } catch (error) {
        output.value = "";
        status.textContent = error.message;
        status.classList.add("error");
      }
    };

    convertButton.addEventListener("click", convert);
    input.addEventListener("input", convert);
    squareButton.addEventListener("click", () => {
      try {
        const value = getInputBigInt();
        setInputBigInt(value * value);
      } catch (error) {
        output.value = "";
        status.textContent = error.message;
        status.classList.add("error");
      }
    });
    sqrtButton.addEventListener("click", () => {
      try {
        setInputBigInt(integerSqrt(getInputBigInt()));
      } catch (error) {
        output.value = "";
        status.textContent = error.message;
        status.classList.add("error");
      }
    });
    times10Button.addEventListener("click", () => {
      try {
        scaleInputBy10(1);
      } catch (error) {
        output.value = "";
        status.textContent = error.message;
        status.classList.add("error");
      }
    });
    divide10Button.addEventListener("click", () => {
      try {
        scaleInputBy10(-1);
      } catch (error) {
        output.value = "";
        status.textContent = error.message;
        status.classList.add("error");
      }
    });
    maxButton.addEventListener("click", () => {
      setInputBigInt(getMaxValue(NUMERAL_SYSTEM));
    });
    clearButton.addEventListener("click", () => {
      input.value = "";
      output.value = "";
      status.textContent = "";
      status.classList.remove("error");
      input.focus();
    });
    copyButton.addEventListener("click", async () => {
      if (!output.value) return;
      await navigator.clipboard.writeText(output.value);
      status.textContent = "コピーしました。";
      status.classList.remove("error");
    });

    updateMaxInfo();
    convert();
  </script>
</body>
</html>
